<p-menubar>
  <ng-template pTemplate="end">
    <div class="grid">
      <div class="col-2 icon">
        <i class="pi pi-user" style="font-size: 1.5rem"></i>
      </div>
      <div class="col-10">
        <h2>{{usuarioLogado}}</h2>
      </div>
    </div>


  </ng-template>
</p-menubar>

<div class="container-home">
<div class="grid table">
  <div class="col-12 p-fluid p-body">
    <p-table [value]="products">

      <ng-template pTemplate="header">
        <tr>
            <th>Modèle</th>
            <th>Nom du produit</th>
            <th class="col-data-header">Numéro de série</th>
            <th class="col-data-header">Professional</th>
            <th class="col-valor-header">Establishment</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-product>
        <tr>
            <td>{{ product.model }}</td>
            <td>{{ product.nproduct }}</td>
            <td class="col-data-content">{{ product.nserie }}</td>
            <td class="col-data-content">{{ product.professional.name }}</td>
            <td class="col-valor-content">{{ product.establishment.name }}</td>
        </tr>
    </ng-template>

    </p-table>
  </div>
</div>
</div>
