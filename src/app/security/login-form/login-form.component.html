

<div class="container" style="max-width: 400px; margin: auto">

  <form autocomplete="off" #loginForm="ngForm">
      <div class="grid">

          <div class="col-12 p-fluid">
              <h1>Login</h1>
          </div>

          <div class="col-12 p-fluid">

              <input pInputText type="email" name="user" placeholder="E-mail" ngModel required #user>
          </div>

          <div class="col-12 p-fluid">
              <input pInputText type="password" name="password" placeholder="Passaword" ngModel required #password>
          </div>

          <div class="col-12">
              <button pButton type="submit" label="Login" [disabled]="loginForm.invalid"
                  (click)="login(user.value, password.value); password.value=''"></button>
          </div>

      </div>
  </form>

</div>
